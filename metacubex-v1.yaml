# ==============================================
# ZgoCloud + Wstunnel + WireGuard
# MetaCubeX 极简稳定版 v1 (clean)
#
# 特点：
# - 不使用 DNS 覆写（交给 Verge）
# - 不使用 SMTP / Google / YouTube 特殊规则
# - 基于 GEOSITE + GEOIP
# - 结构最小化，便于排错
# ==============================================
 
profile:
  store-selected: true
 
# ==============================================
# WireGuard（代理入口）
# ==============================================
 
proxies:
  - name: ZgoCloud-WG
    type: wireguard
    server: 127.0.0.1
    port: 51820
 
    ip: xxx
 
    public-key: xxx
    private-key: xxx
    pre-shared-key: xxx
 
    udp: true
    mtu: 1280
 
# ==============================================
# 代理组
# ==============================================
 
proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - ZgoCloud-WG
      - DIRECT
 
# ==============================================
# 分流规则（核心简化版）
# ==============================================
 
rules:
  # ------------------------------
  # Wstunnel 服务器直连（避免回环）
  # ------------------------------
  - IP-CIDR,154.21.196.249/32,DIRECT,no-resolve
 
  # ------------------------------
  # 本地 / 私有网络
  # ------------------------------
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
 
  # ------------------------------
  # 中国大陆直连
  # ------------------------------
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
 
  # ------------------------------
  # 非中国大陆全部走代理
  # ------------------------------
  - GEOSITE,geolocation-!cn,Proxy
 
  # ------------------------------
  # 默认兜底
  # ------------------------------
  - MATCH,Proxy
